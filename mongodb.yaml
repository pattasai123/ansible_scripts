- name: installing mongodb in remote server
  hosts: mongodb
  become: yes
  tasks:
    - name: copying mongo_repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo
    
    - name: installing mongodb
      ansible.builtin.package:
        name: mongodb-org
        state: present

    - name: staring mongodb
      ansible.builtin.service:
        name: mongod
        state: started
        enabled: yes

    - name: Update API server IP address
      ansible.builtin.replace:
        path: /etc/mongod.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0'
    
    - name: Restart the service nginx
      ansible.builtin.service:
        name: mongod
        state: restarted

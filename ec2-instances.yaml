---
- name: creating instances
  hosts: "{{ item }}"
  connection: local

  vars:
    ami_id: "ami-0220d79f3f480ecf5"
    sgroup: "sg-0045e5825324c775b"
    dname: "bongu.online"      

  tasks:
    - name: running instances
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        instance_type: t3.small
        image_id: "{{ ami_id }}"
        security_group: "{{ sgroup }}"

        tags:
          Name: "{{ item }}"

      loop: "{{ instances }}"
      register: ec2_output

    - name: printing the ec2_output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"
    
    - name: Create Route53 private records
      amazon.aws.route53:
        state: present
        zone: "{{ dname }}"
        record: "{{ item.item }}.{{ dname }}"
        ttl: 1
        type: A
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true

      when: item.item != "frontend"
      loop: "{{ ec2_output.results }}"


    - name: Create Route53 public record for frontend
      amazon.aws.route53:
        state: present
        zone: "{{ dname }}"
        record: "{{ item.item }}.{{ dname }}"
        ttl: 1
        type: A
        value: "{{ item.instances[0].public_ip_address }}"
        overwrite: true

      when: item.item == "frontend"
      loop: "{{ ec2_output.results }}"
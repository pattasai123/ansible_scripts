---
- name: creating instances
  hosts: local
  connection: local

  vars:
    ami_id: "ami-0220d79f3f480ecf5"
    sgroup: "sg-0045e5825324c775b"
    dname: "bongu.online"

    instances:
      - mongodb

  tasks:
    - name: running instances
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        instance_type: t3.small
        image_id: "{{ ami_id }}"
        security_group: "{{ sgroup }}"

        tags:
          Name: "{{ item }}"

      loop: "{{ instances }}"
      register: ec2_output

    - name: printing the ec2_output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"